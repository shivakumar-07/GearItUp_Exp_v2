services:
  - type: web
    name: autospace-backend
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_APP_URL
        sync: false
      - key: RESET_PASSWORD_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_SENDER_EMAIL
        sync: false
      - key: RESEND_SENDER_NAME
        value: AutoSpace
